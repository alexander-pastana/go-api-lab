# Algumas instruções para que o docker:
# faça download da imagem do pg
# Mapeie a porta em que o banco vai rodar
# Algumas outras informações que o pg precisa: senha, usuário e etc

version: "3.9"

services:
  go-app:
    container_name: go-app
    image: github.com/alexander-pastana/go-api-lab-lab
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - go_db

  go_db:
    container_name: go_db
    image: postgres:12
    environment:
      POSTGRES_PASSWORD: 1234
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes: 
  pgdata: {}